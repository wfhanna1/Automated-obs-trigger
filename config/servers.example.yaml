# servers.example.yaml
#
# Copy this file to servers.yaml and fill in your actual values.
# servers.yaml is gitignored — never commit it with real hosts or usernames.
#
# Secrets (SSH private keys, OBS WebSocket passwords) are stored in Azure Key Vault.
# Key naming convention:
#   SSH key:      ssh-key-<server-id>         (base64-encoded PEM)
#   OBS password: obs-ws-password-<server-id>
#
# The server-id in this file must match the server_id column in your CSV schedules.

servers:
  win-server-1:
    name: "Windows Streaming Server 1"
    platform: windows                        # "windows" | "mac"
    host: "203.0.113.10"                     # Public IP or hostname
    ssh:
      user: "admin"
      port: 22
    obs:
      # Full path to obs64.exe on the remote Windows machine
      path: 'C:\Program Files\obs-studio\bin\64bit\obs64.exe'
      websocket_port: 4455

  win-server-2:
    name: "Windows Streaming Server 2"
    platform: windows
    host: "203.0.113.11"
    ssh:
      user: "admin"
      port: 22
    obs:
      path: 'C:\Program Files\obs-studio\bin\64bit\obs64.exe'
      websocket_port: 4455

  mac-server-1:
    name: "Mac Streaming Server 1"
    platform: mac
    host: "203.0.113.20"                     # Public IP or hostname
    ssh:
      user: "admin"
      port: 22
    obs:
      # Full path to OBS binary on the remote Mac
      path: "/Applications/OBS.app/Contents/MacOS/obs"
      websocket_port: 4455
