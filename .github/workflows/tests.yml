# Run unit and integration tests (no Azure credentials required) on every
# pull request and on every push/merge to main.
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff mypy

      - name: Lint with ruff
        run: python -m ruff check .

      - name: Type check with mypy
        run: python -m mypy . --ignore-missing-imports

      - name: Run tests
        run: python -m pytest tests/ -v -m "not integration" --tb=short
